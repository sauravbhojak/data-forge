services:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: dataforge-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=DataForge
      - DEBUG=false
      - HOST=0.0.0.0
      - PORT=8000
      - CORS_ORIGINS=http://localhost:3000,http://localhost:80
      - MAX_ROWS=1000000
      - PREVIEW_ROWS=50
      - MAX_FIELDS=100
      - MAX_TABLES=20
      - CHUNK_SIZE=1000
      - RATE_LIMIT_GENERATE=30/minute
      - RATE_LIMIT_EXPORT=10/minute
      - RATE_LIMIT_PREVIEW=60/minute
      - LOG_LEVEL=INFO
      - LOG_JSON=true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - dataforge-net

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runtime
    container_name: dataforge-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - dataforge-net

networks:
  dataforge-net:
    driver: bridge
